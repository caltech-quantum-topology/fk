version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  apt_packages:
    - libflint-dev
    - libgomp1
    - libopenblas-dev
    - cmake
    - g++

sphinx:
  configuration: docs/conf.py

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - symbolic
        - yaml
        - interactive
    - requirements: docs/requirements.txt
